name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
      - staging
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
      - staging

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0  # Full history for git-info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Set environment file based on branch
        run: |
          BRANCH="${{ github.ref_name }}"
          # For pull requests, use the base branch name
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          fi

          if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            export ENV_FILE=".env.production"
            echo "Loading production environment configuration"
          else
            export ENV_FILE=".env.staging"
            echo "Loading staging environment configuration"
          fi

          if [ -f "$ENV_FILE" ]; then
            echo "Using $ENV_FILE"
            # Export vars to GitHub Actions environment
            grep -v '^#' "$ENV_FILE" | grep '=' | while IFS= read -r line; do
              echo "$line" >> $GITHUB_ENV
            done
          else
            echo "Warning: $ENV_FILE not found"
          fi

      - name: Generate git info
        run: pnpm git-info

      - name: Build application
        run: pnpm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_WAVE_06A45EB03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          output_location: ""
          skip_app_build: true   # We already built above
          production_branch: "master"

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request

    steps:
      - name: Close pull request environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_WAVE_06A45EB03 }}
          action: "close"